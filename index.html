<style>
  :root{--bg:#E9EFED;--surface:#FFFFFF;--ink:#14302A;--muted:#5F736E;--faint:#8C9E99;--line:#D7E2DD;--teal:#0F7A66;--tealDark:#0A5C4D;--tealSoft:#E1EFEB;--chip:#F1F4F3;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  body{font-family:Inter,system-ui,sans-serif;background:#DFE6E3;color:var(--ink);display:flex;justify-content:center;min-height:100vh}
  #app{width:100%;max-width:440px;background:var(--bg);min-height:100vh;position:relative;overflow:hidden}
  .screen{display:flex;flex-direction:column;min-height:100vh}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  textarea,input{font-family:inherit}
  svg{display:block}
  .pad{padding:0 18px}
  .tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;white-space:nowrap;display:inline-block}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:16px}
  .row{display:flex;align-items:center}
  .scroll{flex:1;overflow:auto}
  .iconbtn{height:40px;width:40px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:var(--surface);border:1px solid var(--line)}
  .btn-primary{height:54px;border-radius:16px;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--teal);color:#fff;width:100%}
  .btn-primary:disabled{background:var(--line);color:var(--faint)}
  .btn-soft{height:46px;border-radius:14px;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--surface);border:1px solid var(--line);color:var(--ink);width:100%}
  .header{padding:22px 18px 12px;background:var(--surface);border-bottom:1px solid var(--line)}
  .footer{padding:12px 18px 22px;background:var(--bg);border-top:1px solid var(--line)}
  .ti{height:48px;border:1px solid var(--line);border-radius:12px;padding:0 14px;font-size:16px;width:100%;outline:none;color:var(--ink);background:#fff}
  .ti:focus{border-color:var(--teal)}
  .ti::placeholder{color:var(--faint)}
  .lbl{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);margin-bottom:6px}
  .muted{color:var(--muted)} .faint{color:var(--faint)}
  .ptab{padding:8px 14px;border-radius:999px;font-size:13px;font-weight:600;white-space:nowrap;border:1px solid var(--line);background:var(--surface);color:var(--muted)}
  .ptab.on{background:var(--teal);color:#fff;border-color:var(--teal)}
  @keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(124,91,199,.4)}50%{box-shadow:0 0 0 10px rgba(124,91,199,0)}}
  .glowv{animation:glow 1.6s infinite}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  textarea.grow{resize:none;overflow:hidden}
  @media print{ .no-print{display:none!important} body{background:#fff} #app{max-width:none} .scroll{overflow:visible} .screen{min-height:auto} }
</style>
</head>

<script>
/* ----------------------------- icons ----------------------------- */
const ICONS={

  alert:'<path d="M12 3l9 17H3z"/><path d="M12 9v5M12 17v.5"/>',

  upload:'<path d="M12 16V4M7 9l5-5 5 5"/><path d="M4 20h16"/>',

  dot:'<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="2.6" fill="currentColor" stroke="none"/>'
};
function ic(n,s,c,w){ s=s||20;c=c||'currentColor';w=w||2;
  return '<svg width="'+s+'" height="'+s+'" viewBox="0 0 24 24" fill="none" stroke="'+c+'" stroke-width="'+w+'" stroke-linecap="round" stroke-linejoin="round">'+(ICONS[n]||ICONS.dot)+'</svg>'; }

/* ----------------------------- colors ----------------------------- */
const STATUS={
  grey:{c:'#90A09C',soft:'#E7ECEA',label:'Vide'}, green:{c:'#1C9C76',soft:'#DDF2E9',label:'Tout fait'},
  orange:{c:'#DB8A2A',soft:'#FAEEDA',label:'Partiel'}, red:{c:'#CC4F38',soft:'#F9E3DD',label:'À faire'},
  violet:{c:'#7C5BC7',soft:'#EBE5F8',label:'Attention'}
};
function norm(s){ return String(s).toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function choiceColor(lbl){ const n=norm(lbl); if(/refus|absent|\bnon\b/.test(n)) return STATUS.red.c; if(/partiel|molle|liquide|peu|dure/.test(n)) return STATUS.orange.c; return STATUS.green.c; }

/* ----------------------------- storage ----------------------------- */
const DB={ load(k,fb){ try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch(e){return fb;} },
  save(k,v){ try{localStorage.setItem(k,JSON.stringify(v));}catch(e){} } };

/* ----------------------------- periods & cares ----------------------------- */
const DEFAULT_PERIODS=[{id:'matin',label:'Matin',icon:'sun'},{id:'midi',label:'Midi',icon:'utensils'},{id:'apresmidi',label:'Après-midi',icon:'armchair'},{id:'repas',label:'Repas',icon:'utensils'},{id:'soir',label:'Soir',icon:'bed'},{id:'nuit',label:'Nuit',icon:'moon'}];
const D3=['Fait','Partiel','Refusé'];
const SEED_CARES={
  matin:[
    {id:'m_reveil',label:'Réveil',choices:['Fait','Refusé'],comment:false},
    {id:'m_lever',label:'Lever / fauteuil',choices:D3.slice(),comment:false},
    {id:'m_toilette',label:'Toilette',choices:['Fait','Refusé'],comment:false},
    {id:'m_douche',label:'Douche',choices:['Fait','Refusé'],comment:false},
    {id:'m_meds',label:'Médicaments',choices:['Pris','Partiel','Refusé'],comment:false},
    {id:'m_dej',label:'Petit-déjeuner',choices:['Mangé','Partiel','Refusé'],comment:true},
    {id:'m_selles',label:'Selles',choices:['Normales','Molles','Liquides','Dures','Absentes'],comment:true}
  ],
  midi:[
    {id:'mi_meds',label:'Médicaments',choices:['Pris','Refusé'],comment:false},
    {id:'mi_repas',label:'Déjeuner',choices:['Mangé','Partiel','Refusé'],comment:true},

  ],
  apresmidi:[
    {id:'ap_mob',label:'Mobilisation',choices:D3.slice(),comment:false},
    {id:'ap_coll',label:'Collation / boisson',choices:['Pris','Refusé'],comment:false},
    {id:'ap_toil',label:'Toilettes',choices:['Fait','Refusé'],comment:false}
  ],
  repas:[
    {id:'re_repas',label:'Repas',choices:['Mangé','Partiel','Refusé'],comment:true},
    {id:'re_hydra',label:'Hydratation',choices:['Bien','Peu'],comment:false},
    {id:'re_meds',label:'Médicaments',choices:['Pris','Refusé'],comment:false}
  ],
  soir:[
    {id:'so_meds',label:'Médicaments',choices:['Pris','Refusé'],comment:false},
    {id:'so_diner',label:'Dîner',choices:['Mangé','Partiel','Refusé'],comment:true},
    {id:'so_toil',label:'Toilette du soir',choices:['Fait','Refusé'],comment:false},
    {id:'so_couch',label:'Coucher',choices:['Fait','Refusé'],comment:false}
  ],
  nuit:[
    {id:'nu_ronde',label:'Ronde',choices:['Faite'],comment:false},
    {id:'nu_change',label:'Change',choices:['Fait','Non nécessaire'],comment:false},
    {id:'nu_surv',label:'Surveillance',choices:['RAS','À signaler'],comment:true}
  ]
};
const SEED_ROOMS=[
  {id:'r210',name:'210',patients:[{id:'p1',nick:'Mamie Rose',attention:false,periods:{}}]},
  {id:'r211',name:'211',patients:[{id:'p2',nick:'Le Capitaine',attention:false,periods:{}}]},
  {id:'r212',name:'212',patients:[]},
  {id:'r213',name:'213',patients:[{id:'p3',nick:'Lucie',attention:false,periods:{}},{id:'p4',nick:'Tonton Jo',attention:false,periods:{}}]},
  {id:'r214',name:'214',patients:[{id:'p5',nick:'Madame R.',attention:false,periods:{}}]},
  {id:'r215',name:'215',patients:[{id:'p6',nick:'Papi Léon',attention:false,periods:{}}]}
];
const DEFAULT_CAREGIVERS=['Sophie','Karim','Inès','Marc'];
const DEFAULT_SERVICE='Gériatrie B';

/* ----------------------------- SYNC (couche de partage) ----------------------------- */
/* Adaptateur LOCAL/démo : temps réel entre onglets via 'storage' + BroadcastChannel,
   persistance localStorage namespacée par code de service.
   Pour le réel : remplacer par SupabaseSync (même interface) — voir sync-demo.html
   pour le SQL (table services + RLS + temps réel) et les 3 étapes d'activation. */
const LocalSync = {
  code:null, prefix:null, _cb:null, _bc:null,
  async connect(code){ this.code=code; this.prefix='soinsSvc:'+code+':';
    try{ this._bc=new BroadcastChannel('soinsSvc:'+code); this._bc.onmessage=e=>{ if(this._cb&&e.data&&e.data.key) this._cb(e.data.key, e.data.data); }; }catch(_){}
    window.addEventListener('storage',e=>{ if(e.key&&this.prefix&&e.key.indexOf(this.prefix)===0&&e.newValue){ try{ if(this._cb) this._cb(e.key.slice(this.prefix.length), JSON.parse(e.newValue)); }catch(_){} } });
    return true; },
  async loadAll(){ const map={}; try{ for(let i=0;i<localStorage.length;i++){ const k=localStorage.key(i); if(k&&k.indexOf(this.prefix)===0){ try{ map[k.slice(this.prefix.length)]=JSON.parse(localStorage.getItem(k)); }catch(_){} } } }catch(_){} return map; },
  async pushRow(key,data){ data._origin=myDevice; try{ localStorage.setItem(this.prefix+key, JSON.stringify(data)); }catch(_){}
    if(this._bc) this._bc.postMessage({key,data}); },
  onChange(cb){ this._cb=cb; }
};
/* --- Adaptateur SUPABASE (production) : vraie synchro entre téléphones --- */
const SUPABASE_URL='https://jfxzlclztacrhsozytnr.supabase.co';
const SUPABASE_KEY='sb_publishable_8oZ4TUgq2_Z5cbW6CuCr7A_-WulWl0K'; /* clé publique par conception */
const TEAM_EMAIL='equipe@soins.fr';
const SupabaseSync = {
  code:null, sb:null, _cb:null, _chan:null,
  async connect(code){ this.code=code;
    this.sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
    const {error}=await this.sb.auth.signInWithPassword({email:TEAM_EMAIL,password:code});
    if(error) throw error;
    return true; },
  async loadAll(){ try{ const {data}=await this.sb.from('services').select('code,state'); const map={}; (data||[]).forEach(r=>{ map[r.code]=r.state; });
      try{localStorage.setItem('soinsCache',JSON.stringify(map));}catch(_){} return map; }
    catch(_){ try{ return JSON.parse(localStorage.getItem('soinsCache')||'{}'); }catch(e){ return {}; } } },
  async pushRow(key,data){ data._origin=myDevice;
    try{ const c=JSON.parse(localStorage.getItem('soinsCache')||'{}'); c[key]=data; localStorage.setItem('soinsCache',JSON.stringify(c)); }catch(_){}
    try{ await this.sb.from('services').upsert({code:key,state:data,updated_at:new Date().toISOString()},{onConflict:'code'}); }catch(_){} },
  onChange(cb){ this._cb=cb;
    this._chan=this.sb.channel('svc-all')
      .on('postgres_changes',{event:'*',schema:'public',table:'services'},
          payload=>{ const row=payload.new; if(!row||!row.state||row.state._origin===myDevice) return; if(this._cb) this._cb(row.code, row.state); })
      .subscribe(); }
};
/* Si la lib Supabase est chargée → vraie synchro ; sinon repli local (démo entre onglets). */
const Sync = (typeof window!=='undefined' && window.supabase) ? SupabaseSync : LocalSync;

/* ----------------------------- state ----------------------------- */
const app=document.getElementById('app');
const S = { caregiver:'', period:'matin', serviceCode:null, _lastCode:'',
  service:DEFAULT_SERVICE, caregivers:DEFAULT_CAREGIVERS.slice(),
  periods:JSON.parse(JSON.stringify(DEFAULT_PERIODS)), careLists:JSON.parse(JSON.stringify(SEED_CARES)),
  rooms:JSON.parse(JSON.stringify(SEED_ROOMS)), alerts:[], locks:{} };
S.screen='service'; S.curRoom=null; S.curPatient=null; S._heldPid=null; S.settingsTab='general'; S.settingsPeriod='matin'; S.showAlerts=false; S.listening=false;
const dev=DB.load('soinsDevice',null); if(dev){ if(dev.caregiver)S.caregiver=dev.caregiver; S._lastCode=dev.lastCode||''; }
S.periods.forEach(p=>{ if(!S.careLists[p.id]) S.careLists[p.id]=[]; });
let rec=null;

/* ----------------------------- verrou par patient ----------------------------- */
const LOCK_TTL=30000; /* un verrou expire après 30 s sans rafraîchissement */
const myDevice='dev'+Math.random().toString(36).slice(2,9)+Date.now().toString(36); /* identité par session/onglet */
function lockOf(pid){ return (S.locks||{})[pid]; }
function lockActive(l){ return !!l && (Date.now()-l.ts)<LOCK_TTL; }
function lockedByOther(pid){ const l=lockOf(pid); return lockActive(l) && l.device!==myDevice; }
function acquireLock(pid){ if(!pid) return false; S.locks=S.locks||{}; if(lockedByOther(pid)) return false; S.locks[pid]={by:S.caregiver||'?',device:myDevice,ts:Date.now()}; S._heldPid=pid; saveLocks(); return true; }
function takeLock(pid){ S.locks=S.locks||{}; S.locks[pid]={by:S.caregiver||'?',device:myDevice,ts:Date.now()}; S._heldPid=pid; saveLocks(); }
function releaseLock(pid){ if(S.locks&&S.locks[pid]&&S.locks[pid].device===myDevice) delete S.locks[pid]; if(S._heldPid===pid)S._heldPid=null; saveLocks(); }
function ensureEditable(){ const pid=S.curPatient; if(lockedByOther(pid)) return false; const l=lockOf(pid); if(!l||l.device!==myDevice) acquireLock(pid); return true; }
/* battement de cœur : maintient mon verrou, rafraîchit l'affichage, libère les verrous expirés */
setInterval(()=>{ if(!S.serviceCode) return;
  if(S.screen==='patient' && S.curPatient){ const l=lockOf(S.curPatient); if(l&&l.device===myDevice){ l.ts=Date.now(); saveLocks(); } }
  const ae=document.activeElement; const typing=ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA');
  if((S.screen==='room'||S.screen==='patient') && !typing) render();
}, 8000);

/* ----------------------------- sérialisation granulaire ----------------------------- */
/* Lignes : 'config' (service, soignants, périodes, listes de soins, structure des chambres),
   'pat:<id>' (données de soins d'un patient), 'alerts', 'locks'. */
function configData(){ return { service:S.service, caregivers:S.caregivers, periods:S.periods, careLists:S.careLists,
  rooms:S.rooms.map(r=>({ id:r.id, name:r.name, patients:r.patients.map(p=>({id:p.id,nick:p.nick})) })) }; }
function patData(p){ return { attention:!!p.attention, periods:p.periods||{} }; }
function findPatientById(id){ for(const r of S.rooms){ const p=r.patients.find(x=>x.id===id); if(p) return p; } return null; }

const _pt={};
function pushRowDeb(key, get){ if(!S.serviceCode) return; clearTimeout(_pt[key]); _pt[key]=setTimeout(()=>{ Sync.pushRow(key, get()); }, 300); }
function rememberDevice(){ DB.save('soinsDevice',{lastCode:S.serviceCode,caregiver:S.caregiver}); }
function savePatient(p){ rememberDevice(); if(p) pushRowDeb('pat:'+p.id, ()=>patData(p)); }
function saveConfig(){ rememberDevice(); pushRowDeb('config', configData); }
function saveAlerts(){ pushRowDeb('alerts', ()=>({list:S.alerts})); }
function saveLocks(){ rememberDevice(); pushRowDeb('locks', ()=>({map:S.locks})); }
function pushAllRows(){ if(!S.serviceCode) return;
  Sync.pushRow('config', configData());
  S.rooms.forEach(r=>r.patients.forEach(p=>Sync.pushRow('pat:'+p.id, patData(p))));
  Sync.pushRow('alerts', {list:S.alerts});
  Sync.pushRow('locks', {map:S.locks}); }

/* ----------------------------- lecture / reconstruction ----------------------------- */
function fixPeriods(){ S.periods.forEach(p=>{ if(!S.careLists[p.id]) S.careLists[p.id]=[]; });
  if(!S.periods.find(p=>p.id===S.period))S.period=S.periods[0].id;
  if(!S.periods.find(p=>p.id===S.settingsPeriod))S.settingsPeriod=S.periods[0].id; }
function assembleFromRows(map){ const cfg=map['config'];
  if(cfg){ if(cfg.service!=null)S.service=cfg.service; if(cfg.caregivers)S.caregivers=cfg.caregivers; if(cfg.periods&&cfg.periods.length)S.periods=cfg.periods; if(cfg.careLists)S.careLists=cfg.careLists;
    S.rooms=(cfg.rooms||[]).map(r=>({ id:r.id, name:r.name, patients:(r.patients||[]).map(sp=>{ const pr=map['pat:'+sp.id]; return { id:sp.id, nick:sp.nick, attention:pr?!!pr.attention:false, periods:pr?(pr.periods||{}):{} }; }) })); }
  S.alerts=(map['alerts']&&map['alerts'].list)||[];
  S.locks=(map['locks']&&map['locks'].map)||{};
  fixPeriods(); }
function applyConfigRow(cfg){ if(!cfg)return; if(cfg.service!=null)S.service=cfg.service; if(cfg.caregivers)S.caregivers=cfg.caregivers; if(cfg.periods&&cfg.periods.length)S.periods=cfg.periods; if(cfg.careLists)S.careLists=cfg.careLists;
  if(cfg.rooms){ const old={}; S.rooms.forEach(r=>r.patients.forEach(p=>old[p.id]=p)); /* on garde les données de soins déjà en mémoire */
    S.rooms=cfg.rooms.map(r=>({ id:r.id, name:r.name, patients:(r.patients||[]).map(sp=>{ const ex=old[sp.id]; if(ex){ ex.nick=sp.nick; return ex; } return { id:sp.id, nick:sp.nick, attention:false, periods:{} }; }) })); }
  fixPeriods(); }
function applyPatientRow(id,data){ const p=findPatientById(id); if(p){ p.attention=!!(data&&data.attention); p.periods=(data&&data.periods)||{}; } }

let pendingRemote=false;
function applyRow(key,data){
  if(key==='config') applyConfigRow(data);
  else if(key.indexOf('pat:')===0) applyPatientRow(key.slice(4), data);
  else if(key==='alerts') S.alerts=(data&&data.list)||[];
  else if(key==='locks'){ S.locks=(data&&data.map)||{}; if(S._heldPid && !lockedByOther(S._heldPid)){ S.locks[S._heldPid]={by:S.caregiver||'?',device:myDevice,ts:Date.now()}; } }
  const ae=document.activeElement;
  if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA')) pendingRemote=true; else { render(); syncToast(); }
}
document.addEventListener('focusout',()=>{ if(pendingRemote){ pendingRemote=false; setTimeout(render,60); } });
function syncToast(){ let t=document.getElementById('syncToast'); if(!t){ t=document.createElement('div'); t.id='syncToast';
    t.style.cssText='position:fixed;left:50%;bottom:20px;transform:translateX(-50%);background:#14302A;color:#fff;font:600 12.5px Inter,sans-serif;padding:8px 14px;border-radius:999px;z-index:99;opacity:0;transition:opacity .2s'; document.body.appendChild(t); }
  t.textContent='Mis à jour par un autre appareil'; t.style.opacity='1'; clearTimeout(t._h); t._h=setTimeout(()=>{t.style.opacity='0';},1600); }

async function connectService(code){
  try{ await Sync.connect(code); }
  catch(e){ svcError('Code incorrect, ou connexion impossible. Vérifie le code et ta connexion internet.'); return; }
  S.serviceCode=code; rememberDevice();
  const map=await Sync.loadAll();
  if(map && map['config']){ assembleFromRows(map); }
  else { /* nouveau service ou migration depuis l'ancien format (ligne 'main') */
    const old = (map && map['main']) ? map['main'] : DB.load('soinsCouloir3',null);
    if(old){ if(old.service)S.service=old.service; if(old.caregivers)S.caregivers=old.caregivers; if(old.periods&&old.periods.length)S.periods=old.periods; if(old.careLists)S.careLists=old.careLists; if(old.rooms)S.rooms=old.rooms; if(old.alerts)S.alerts=old.alerts; }
    fixPeriods(); pushAllRows();
  }
  Sync.onChange(applyRow);
  go('start');
}
function svcError(m){ const e=document.getElementById('svcErr'); if(e) e.textContent=m; const b=document.getElementById('svcGo'); if(b) b.innerHTML='Rejoindre'; }
function go(s){ if(S.screen==='patient' && s!=='patient' && S.curPatient){ releaseLock(S.curPatient); } if(rec&&S.listening){ try{rec.stop();}catch(e){} } S.screen=s; render(); window.scrollTo(0,0); }
function periodLabel(id){ const p=S.periods.find(x=>x.id===id); return p?p.label:id; }
function dayKey(ts){ const d=new Date(ts); const z=n=>n<10?'0'+n:''+n; return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate()); }

/* ----------------------------- helpers ----------------------------- */
function htmlEsc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function attr(s){ return htmlEsc(s).replace(/"/g,'&quot;'); }
function ensurePP(p,period){ if(!p.periods[period]) p.periods[period]={status:{},careComment:{},disabled:{},comment:'',reverted:false};
  const pp=p.periods[period]; pp.status=pp.status||{}; pp.careComment=pp.careComment||{}; pp.disabled=pp.disabled||{}; if(pp.comment==null)pp.comment=''; return pp; }
function careHandled(c,pp){ if(pp.disabled[c.id]) return null; const hasCh=c.choices&&c.choices.length;
  if(hasCh) return !!pp.status[c.id]; if(c.comment) return !!(pp.careComment[c.id]&&pp.careComment[c.id].trim()); return false; }
function completion(p,period){ const pp=ensurePP(p,period); let en=0,hd=0; (S.careLists[period]||[]).forEach(c=>{ const h=careHandled(c,pp); if(h===null) return; en++; if(h) hd++; }); return {en,hd}; }
function patientColor(p,period){ if(p.attention) return 'violet'; const pp=ensurePP(p,period); if(pp.reverted) return 'green'; const {en,hd}=completion(p,period); if(en===0) return 'green'; if(hd===0) return 'red'; if(hd>=en) return 'green'; return 'orange'; }
function roomColor(room,period){ if(!room.patients.length) return 'grey'; if(room.patients.some(p=>p.attention)) return 'violet'; let en=0,hd=0; room.patients.forEach(p=>{ const c=completion(p,period); const pp=ensurePP(p,period); en+=c.en; hd+=pp.reverted?c.en:c.hd; }); if(en===0) return 'green'; if(hd===0) return 'red'; if(hd>=en) return 'green'; return 'orange'; }
function roomFrac(room,period){ let en=0,hd=0; room.patients.forEach(p=>{ const c=completion(p,period); const pp=ensurePP(p,period); en+=c.en; hd+=pp.reverted?c.en:c.hd; }); return {en,hd}; }
function findRoom(id){ return S.rooms.find(r=>r.id===id); }
function findPatient(){ const r=findRoom(S.curRoom); if(!r)return null; return r.patients.find(p=>p.id===S.curPatient); }
function flash(el,msg){ if(!el)return; const o=el.innerHTML; el.innerHTML=msg; setTimeout(()=>{el.innerHTML=o;},1600); }

/* ----------------------------- dictation (robust) ----------------------------- */
function dictate(getText,setText,setBtn){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(S.listening){ if(rec){try{rec.stop();}catch(e){}} return; }
  if(!SR){ if(setBtn)setBtn('na'); setTimeout(()=>{ if(setBtn)setBtn(false); },1800); return; }
  const base=(getText()||'').trim();
  rec=new SR(); rec.lang='fr-FR'; rec.continuous=false; rec.interimResults=false; rec.maxAlternatives=1;
  rec.onstart=()=>{ S.listening=true; if(setBtn)setBtn(true); };
  rec.onerror=()=>{ S.listening=false; if(setBtn)setBtn('na'); setTimeout(()=>{ if(setBtn)setBtn(false); },1800); };
  rec.onend=()=>{ S.listening=false; if(setBtn)setBtn(false); savePatient(findPatient()); };
  rec.onresult=(e)=>{ let txt=''; for(let i=0;i<e.results.length;i++) txt+=e.results[i][0].transcript; txt=txt.trim();
    if(txt) setText(((base?base+' ':'')+txt).replace(/\s+/g,' ').trim()); };
  try{ rec.start(); }catch(e){ S.listening=false; if(setBtn)setBtn(false); }
}
function generalMic(){ const p=findPatient(); if(!p)return; const pp=ensurePP(p,S.period);
  dictate(()=>pp.comment, t=>{ pp.comment=t; const ta=document.getElementById('comTa'); if(ta){ta.value=t;autoGrow(ta);} },
    st=>{ const b=document.getElementById('micCom'); if(!b)return;
      if(st===true) b.innerHTML=ic('stop',14,STATUS.red.c)+'Écoute…';
      else if(st==='na') b.innerHTML=ic('mic',14,STATUS.red.c)+'Indispo';
      else b.innerHTML=ic('mic',14,'var(--teal)')+'Dicter'; }); }
function careMic(cid){ const p=findPatient(); if(!p)return; const pp=ensurePP(p,S.period);
  dictate(()=>pp.careComment[cid]||'', t=>{ pp.careComment[cid]=t; const inp=document.getElementById('cc_'+cid); if(inp){inp.value=t;autoGrow(inp);} },
    st=>{ const b=document.getElementById('ccm_'+cid); if(!b)return;
      b.innerHTML = ic(st===true?'stop':(st==='na'?'ban':'mic'), 18, st===true?STATUS.red.c:(st==='na'?STATUS.red.c:'var(--tealDark)')); }); }

/* ----------------------------- render ----------------------------- */
function render(){ const m={service:serviceScreen,start:startScreen,board:boardScreen,room:roomScreen,patient:patientScreen,settings:settingsScreen,export:exportScreen};
  app.innerHTML=(m[S.screen]||serviceScreen)(); if(S.screen==='start') updateStart(); sizeGrowers(); }
function autoGrow(el){ if(!el)return; el.style.height='auto'; el.style.height=Math.max(el.scrollHeight,40)+'px'; }
function sizeGrowers(){ document.querySelectorAll('textarea.grow').forEach(autoGrow); }
function tag(t,bg,fg){ return '<span class="tag" style="background:'+bg+';color:'+fg+'">'+t+'</span>'; }
function statusDot(col,size){ size=size||9; return '<span style="width:'+size+'px;height:'+size+'px;border-radius:999px;display:inline-block;background:'+STATUS[col].c+'"></span>'; }

function patientScreen(){
  const r=findRoom(S.curRoom), p=findPatient(); if(!p){ go('room'); return ''; }
  const pp=ensurePP(p,S.period); const col=patientColor(p,S.period); const s=STATUS[col]; const {en,hd}=completion(p,S.period);

        +'<button id="ccm_'+c.id+'" data-action="careMic" data-c="'+c.id+'" style="height:42px;width:46px;border-radius:10px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--tealSoft);color:var(--tealDark)">'+ic('mic',18,'var(--tealDark)')+'</button></div>'; }

    +'<span class="tag" style="background:'+s.c+';color:#fff">'+s.label+'</span></div>'
    +'<div class="row" style="gap:10px;margin-top:12px"><div style="flex:1;height:8px;border-radius:999px;background:var(--chip);overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+STATUS.green.c+'"></div></div><span style="font-size:12.5px;font-weight:700;color:var(--muted)">'+hd+'/'+en+'</span></div></div>'
    +'<div class="scroll pad" style="padding-top:14px;padding-bottom:18px">'
      +(ro?'<div style="background:'+STATUS.violet.soft+';color:'+STATUS.violet.c+';font-size:13px;font-weight:600;padding:11px 14px;border-radius:12px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px"><span>✋ Modifié par '+htmlEsc(lk?lk.by:'?')+' en ce moment</span><button data-action="takeLock" style="background:'+STATUS.violet.c+';color:#fff;font-weight:700;font-size:12.5px;padding:7px 12px;border-radius:999px;white-space:nowrap">Reprendre la main</button></div>'

/* ----------------------------- new day reset ----------------------------- */
function doReset(){
  S.rooms.forEach(r=>r.patients.forEach(p=>{ p.attention=false;
    Object.keys(p.periods||{}).forEach(per=>{ const pp=p.periods[per]; pp.status={}; pp.careComment={}; pp.comment=''; pp.reverted=false; /* on garde pp.disabled (config par chambre) */ });
  }));
  S.alerts=[]; pushAllRows(); go('board');
}
function newDay(){
  if(!window.confirm('Nouvelle journée : un PDF et une sauvegarde vont être générés, puis les choix et commentaires du jour seront effacés (les soins requis/non requis par chambre sont conservés). Continuer ?')) return;
  backupDownload();
  window.print();
  doReset();
}
function backupDownload(){ try{
  const data={app:'soins-couloir',v:1,date:Date.now(),service:S.service,caregivers:S.caregivers,periods:S.periods,careLists:S.careLists,rooms:S.rooms,alerts:S.alerts};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download='soins-'+dayKey(Date.now())+'.json'; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}catch(e){} }
function importBackup(file){ const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result);
    if(d&&d.rooms&&d.careLists){ if(d.service)S.service=d.service; if(d.caregivers)S.caregivers=d.caregivers; if(d.periods&&d.periods.length)S.periods=d.periods; S.careLists=d.careLists; S.rooms=d.rooms; S.alerts=d.alerts||[];
      if(!S.periods.find(p=>p.id===S.period))S.period=S.periods[0].id; if(!S.periods.find(p=>p.id===S.settingsPeriod))S.settingsPeriod=S.periods[0].id;
      pushAllRows(); window.alert('Sauvegarde restaurée.'); go('board'); }
    else window.alert('Fichier non reconnu.'); }
    catch(e){ window.alert('Fichier illisible.'); } };
  r.readAsText(file); }

/* ----------------------------- export / bilan PDF ----------------------------- */
function careExportLine(c,pp){
  const st=pp.status?pp.status[c.id]:null;
  const cm=(pp.careComment&&pp.careComment[c.id]||'').trim();
  if(!st && !cm) return null;
  let s=htmlEsc(c.label);
  if(st) s+=' : <b>'+htmlEsc(st)+'</b>';
  if(cm) s+=(st?' — ':' : ')+htmlEsc(cm);
  return s;
}
function patientHasData(p){
  return Object.keys(p.periods||{}).some(per=>{ const pp=p.periods[per]; if(!pp) return false;
    if(pp.comment&&pp.comment.trim()) return true;
    return (S.careLists[per]||[]).some(c=>(pp.status&&pp.status[c.id])||(pp.careComment&&pp.careComment[c.id]&&pp.careComment[c.id].trim()));
  }) || p.attention;
}
function exportScreen(){
  const dateStr=new Date().toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  let blocks='';
  S.rooms.forEach(r=>{ const pats=r.patients.filter(patientHasData); if(!pats.length) return;
    pats.forEach(p=>{
      let perBlocks='';
      S.periods.forEach(per=>{ const pp=p.periods[per.id]; if(!pp) return;
        const lines=(S.careLists[per.id]||[]).map(c=>careExportLine(c,pp)).filter(Boolean);
        const gc=(pp.comment||'').trim();
        if(!lines.length && !gc) return;
        perBlocks+='<div style="margin:6px 0 4px"><div style="font-size:12px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.04em">'+htmlEsc(per.label)+'</div>'
          +lines.map(l=>'<div style="font-size:13px;padding:1px 0">• '+l+'</div>').join('')
          +(gc?'<div style="font-size:13px;padding:2px 0;font-style:italic">Commentaire : '+htmlEsc(gc)+'</div>':'')+'</div>';
      });
      blocks+='<div class="card" style="padding:14px;margin-bottom:10px;break-inside:avoid">'
        +'<div class="row" style="justify-content:space-between"><div style="font-weight:800;font-size:15px">'+htmlEsc(p.nick)+(p.attention?' <span style="color:'+STATUS.violet.c+'">⚠ attention</span>':'')+'</div><div class="faint" style="font-size:12.5px">Chambre '+htmlEsc(r.name)+'</div></div>'
        +(perBlocks||'<div class="faint" style="font-size:13px">Aucun soin renseigné</div>')+'</div>';
    });
  });
  if(!blocks) blocks='<div class="card" style="padding:24px;text-align:center"><div class="faint">Aucune donnée à exporter pour le moment.</div></div>';
  const pending=S.rooms.filter(r=>{ const c=roomColor(r,S.period); return c==='red'||c==='orange'; }).length;
  const warn = pending ? '<div style="background:'+STATUS.orange.soft+';color:#8a5a12;font-size:12.5px;font-weight:600;padding:10px 14px;border-radius:12px;margin-bottom:10px">⚠ La journée ne semble pas terminée : '+pending+' chambre(s) avec des soins en attente sur « '+htmlEsc(periodLabel(S.period))+' ».</div>' : '';
  return '<div class="screen">'
    +'<div class="header no-print"><div class="row" style="gap:12px"><button class="iconbtn" data-action="back">'+ic('chevL',20,'var(--muted)')+'</button>'
      +'<div style="flex:1"><div style="font-size:18px;font-weight:800">Bilan de la journée</div><div class="faint" style="font-size:12.5px;text-transform:capitalize">'+dateStr+'</div></div></div></div>'
    +'<div class="scroll pad" style="padding-top:14px;padding-bottom:16px">'
      +'<div style="margin-bottom:12px"><div style="font-size:20px;font-weight:800">Transmissions — '+htmlEsc(S.service)+'</div><div class="muted" style="font-size:13px;text-transform:capitalize">'+dateStr+' · soignant : '+htmlEsc(S.caregiver||'—')+'</div></div>'
      +blocks+'</div>'
    +'<div class="footer no-print"><button class="btn-primary" data-action="printDay">'+ic('file',20,'#fff')+' Imprimer / Enregistrer en PDF</button>'
      +'<button data-action="backupExport" class="btn-soft" style="margin-top:10px">'+ic('upload',18,'var(--teal)')+'Sauvegarde de secours (.json)</button>'
      +'<div style="height:1px;background:var(--line);margin:14px 0"></div>'+warn
      +'<button data-action="newDay" class="btn-soft" style="border-color:'+STATUS.red.c+'55;color:'+STATUS.red.c+'">'+ic('rotate',18,STATUS.red.c)+'Nouvelle journée (réinitialiser)</button>'
      +'<p class="faint" style="font-size:11px;text-align:center;margin-top:8px;line-height:1.45">Le PDF et une sauvegarde sont générés automatiquement. Les choix et commentaires sont effacés ; les soins requis/non requis par chambre sont conservés.</p></div>'
  +'</div>';
}

/* ----------------------------- events ----------------------------- */
app.addEventListener('input', e=>{ const t=e.target; if(!t) return;
  if(t.id==='cgName'){ S.caregiver=t.value; updateStart(); }
  else if(t.id==='comTa'){ if(lockedByOther(S.curPatient)){ autoGrow(t); return; } ensureEditable(); const p=findPatient(); if(p){ ensurePP(p,S.period).comment=t.value; savePatient(p); } autoGrow(t); }
  else if(t.id&&t.id.indexOf('cc_')===0){ if(lockedByOther(S.curPatient)){ autoGrow(t); return; } ensureEditable(); const p=findPatient(); if(p){ ensurePP(p,S.period).careComment[t.id.slice(3)]=t.value; savePatient(p); } autoGrow(t); }
  else if(t.id&&t.id.indexOf('carelabel_')===0){ const c=(S.careLists[S.settingsPeriod]||[]).find(x=>x.id===t.id.slice(10)); if(c){ c.label=t.value; saveConfig(); } }
  else if(t.id==='serviceName'){ S.service=t.value; saveConfig(); }
  else if(t.id&&t.id.indexOf('cgEdit_')===0){ const i=+t.id.slice(7); if(S.caregivers[i]!=null){ S.caregivers[i]=t.value; saveConfig(); } }
  else if(t.id&&t.id.indexOf('perEdit_')===0){ const per=S.periods.find(p=>p.id===t.id.slice(8)); if(per){ per.label=t.value; saveConfig(); } }
});
app.addEventListener('change', e=>{ if(e.target&&e.target.id==='restoreFile'){ const f=e.target.files&&e.target.files[0]; if(f) importBackup(f); } });
app.addEventListener('click', e=>{ const el=e.target.closest('[data-action]'); if(!el) return; const a=el.getAttribute('data-action');
  if(a==='pickCg'){ S.caregiver=el.getAttribute('data-n'); render(); }
  else if(a==='enterService'){ const v=(document.getElementById('svcCode').value||'').trim(); if(v){ svcError(''); el.innerHTML='Connexion…'; connectService(v); } }
  else if(a==='changeService'){ S.screen='service'; render(); }
  else if(a==='enter'){ if(S.caregiver.trim()){ rememberDevice(); go('board'); } }
  else if(a==='period'){ S.period=el.getAttribute('data-p'); render(); }
  else if(a==='toSettings'){ S.settingsTab='general'; go('settings'); }
  else if(a==='toggleAlerts'){ S.showAlerts=!S.showAlerts; render(); }
  else if(a==='jump'){ S.curRoom=el.getAttribute('data-r'); S.curPatient=el.getAttribute('data-p'); S.showAlerts=false; if(!lockedByOther(S.curPatient)) acquireLock(S.curPatient); go('patient'); }
  else if(a==='openRoom'){ S.curRoom=el.getAttribute('data-id'); go('room'); }
  else if(a==='openPatient'){ S.curPatient=el.getAttribute('data-p'); if(!lockedByOther(S.curPatient)) acquireLock(S.curPatient); go('patient'); }
  else if(a==='takeLock'){ takeLock(S.curPatient); render(); }
  else if(a==='back'){ if(S.screen==='room') go('board'); else if(S.screen==='patient') go('room'); else go('board'); }
  else if(a==='setStatus'){ if(!ensureEditable())return; const p=findPatient(); const pp=ensurePP(p,S.period); const c=el.getAttribute('data-c'),st=el.getAttribute('data-s'); if(pp.status[c]===st) delete pp.status[c]; else pp.status[c]=st; pp.reverted=false; savePatient(p); render(); }
  else if(a==='toutFait'){ if(!ensureEditable())return; const p=findPatient(); const pp=ensurePP(p,S.period); (S.careLists[S.period]||[]).forEach(c=>{ if(pp.disabled[c.id])return; if(c.choices&&c.choices.length) pp.status[c.id]=c.choices[0]; }); pp.reverted=false; savePatient(p); render(); }
  else if(a==='disableCare'){ if(!ensureEditable())return; const p=findPatient(); const pp=ensurePP(p,S.period); const c=el.getAttribute('data-c'); pp.disabled[c]=!pp.disabled[c]; if(pp.disabled[c]){ delete pp.status[c]; delete pp.careComment[c]; } savePatient(p); render(); }
  else if(a==='careMic'){ if(!ensureEditable())return; careMic(el.getAttribute('data-c')); }
  else if(a==='micComment'){ if(!ensureEditable())return; generalMic(); }
  else if(a==='attention'){ if(!ensureEditable())return; const p=findPatient(); p.attention=!p.attention; savePatient(p); render(); }
  else if(a==='notify'){ if(!ensureEditable())return; const p=findPatient(),r=findRoom(S.curRoom); S.alerts.unshift({room:r.name,nick:p.nick,ts:Date.now()}); saveAlerts(); flash(document.getElementById('notifyBtn'), ic('check',18,STATUS.violet.c)+' Alerte envoyée à l\'équipe'); }
  else if(a==='revert'){ /* remplacé par export PDF */ }
  else if(a==='exportDay'){ go('export'); }
  else if(a==='printDay'){ window.print(); }
  else if(a==='newDay'){ newDay(); }
  else if(a==='backupExport'){ backupDownload(); }
  else if(a==='addCg'){ const v=(document.getElementById('newCg').value||'').trim(); if(!v)return; S.caregivers.push(v); saveConfig(); render(); }
  else if(a==='delCg'){ S.caregivers.splice(+el.getAttribute('data-i'),1); saveConfig(); render(); }
  else if(a==='addPeriod'){ const v=(document.getElementById('newPeriod').value||'').trim(); if(!v)return; const id='per'+Date.now(); S.periods.push({id,label:v,icon:'dot'}); S.careLists[id]=[]; saveConfig(); render(); }
  else if(a==='delPeriod'){ if(S.periods.length<=1)return; const id=el.getAttribute('data-p'); if(!window.confirm('Supprimer la période « '+periodLabel(id)+' » et sa liste de soins ?'))return; S.periods=S.periods.filter(p=>p.id!==id); delete S.careLists[id]; if(S.period===id)S.period=S.periods[0].id; if(S.settingsPeriod===id)S.settingsPeriod=S.periods[0].id; saveConfig(); render(); }
  else if(a==='addPatientPrompt'){ S.settingsTab='chambres'; go('settings'); }
  else if(a==='setTab'){ S.settingsTab=el.getAttribute('data-t'); render(); }
  else if(a==='setSP'){ S.settingsPeriod=el.getAttribute('data-p'); render(); }
  else if(a==='delCare'){ const c=el.getAttribute('data-c'); S.careLists[S.settingsPeriod]=S.careLists[S.settingsPeriod].filter(x=>x.id!==c); saveConfig(); render(); }
  else if(a==='addCare'){ const l=(document.getElementById('newCareLabel').value||'').trim(); if(!l)return; S.careLists[S.settingsPeriod].push({id:'c'+Date.now(),label:l,choices:D3.slice(),comment:false}); saveConfig(); render(); }
  else if(a==='toggleChoix'){ const c=(S.careLists[S.settingsPeriod]||[]).find(x=>x.id===el.getAttribute('data-c')); if(!c)return; if(c.choices&&c.choices.length){ c.choices=null; if(!c.comment) c.comment=true; } else c.choices=D3.slice(); saveConfig(); render(); }
  else if(a==='toggleComment'){ const c=(S.careLists[S.settingsPeriod]||[]).find(x=>x.id===el.getAttribute('data-c')); if(!c)return; c.comment=!c.comment; if(!c.comment&&!(c.choices&&c.choices.length)) c.choices=['Fait','Refusé']; saveConfig(); render(); }
  else if(a==='addChoice'){ const cid=el.getAttribute('data-c'); const c=(S.careLists[S.settingsPeriod]||[]).find(x=>x.id===cid); const inp=document.getElementById('addchoice_'+cid); const v=(inp.value||'').trim(); if(!c||!v)return; c.choices=c.choices||[]; c.choices.push(v); saveConfig(); render(); }
  else if(a==='delChoice'){ const cid=el.getAttribute('data-c'); const c=(S.careLists[S.settingsPeriod]||[]).find(x=>x.id===cid); if(!c||!c.choices)return; c.choices.splice(+el.getAttribute('data-i'),1); saveConfig(); render(); }
  else if(a==='addRoom'){ const n=(document.getElementById('newRoom').value||'').trim(); if(!n)return; S.rooms.push({id:'r'+Date.now(),name:n,patients:[]}); saveConfig(); render(); }
  else if(a==='delRoom'){ const r=el.getAttribute('data-r'); S.rooms=S.rooms.filter(x=>x.id!==r); saveConfig(); render(); }
  else if(a==='addPatient'){ const rid=el.getAttribute('data-r'); const inp=document.getElementById('np_'+rid); const nick=(inp.value||'').trim(); if(!nick)return; findRoom(rid).patients.push({id:'p'+Date.now(),nick,attention:false,periods:{}}); saveConfig(); render(); }
  else if(a==='delPatient'){ const rid=el.getAttribute('data-r'),pid=el.getAttribute('data-p'); const r=findRoom(rid); r.patients=r.patients.filter(x=>x.id!==pid); saveConfig(); render(); }
});

render();
if('serviceWorker' in navigator){ window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); }); }
</script>
</body>
</html>
